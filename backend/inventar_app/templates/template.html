<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Milijan Davidovic | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Kompletter Reset für absolute Zentrierung */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body,
      html {
        width: 100%;
        height: 100%;
        overflow: hidden; /* Verhindert Scrollen während der Animation */
        background-color: #0f172a;
        font-family: "Inter", sans-serif;
      }

      /* Canvas fixiert im Hintergrund */
      #bg-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 1;
      }

      /* Wrapper für die vertikale und horizontale Zentrierung */
      .master-wrapper {
        position: relative;
        z-index: 10;
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100vw;
        height: 100vh;
        pointer-events: none; /* Klicks gehen durch auf Canvas */
      }

      /* Die Card */
      .glass-card {
        pointer-events: auto; /* Buttons wieder klickbar machen */
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(103, 232, 249, 0.2);
        border-radius: 2.5rem;
        padding: 3rem;
        width: 90%;
        max-width: 500px;
        text-align: center;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
      }

      /* Bild-Container Styling */
      .profile-container {
        position: relative;
        width: 140px;
        height: 140px;
        margin: 0 auto 1.5rem auto;
      }

      .profile-image {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        object-fit: cover;
        border: 4px solid #3b82f6;
        box-shadow: 0 0 25px rgba(59, 130, 246, 0.4);
      }

      .status-dot {
        position: absolute;
        bottom: 8px;
        right: 8px;
        width: 20px;
        height: 20px;
        background: #22c55e;
        border: 3px solid #0f172a;
        border-radius: 50%;
        box-shadow: 0 0 10px rgba(34, 197, 94, 0.6);
      }

      .title-gradient {
        background: linear-gradient(to right, #67e8f9, #3b82f6);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        font-size: 2.25rem;
        font-weight: 800;
        margin-bottom: 0.5rem;
      }

      .btn-primary {
        background: #3b82f6;
        color: white;
        padding: 0.75rem 1.5rem;
        border-radius: 0.75rem;
        font-weight: 600;
        display: block;
        margin-bottom: 0.75rem;
        transition: all 0.3s ease;
        text-decoration: none;
      }

      .btn-primary:hover {
        background: #2563eb;
        transform: translateY(-2px);
      }

      .btn-secondary {
        background: rgba(255, 255, 255, 0.05);
        color: #cbd5e1;
        padding: 0.75rem 1.5rem;
        border-radius: 0.75rem;
        border: 1px solid rgba(255, 255, 255, 0.1);
        display: block;
        transition: all 0.3s ease;
        text-decoration: none;
      }

      .btn-secondary:hover {
        background: rgba(255, 255, 255, 0.1);
      }
    </style>
  </head>
  <body>
    <canvas id="bg-canvas"></canvas>

    <div class="master-wrapper">
      <div class="glass-card">
        <!-- Profil Bild -->
        <div class="profile-container">
          <img
            src="/static/img/milijan.jpg"
            alt="Milijan"
            class="profile-image"
            onerror="
              this.src =
                'https://ui-avatars.com/api/?name=Milijan+Davidovic&background=004a99&color=fff&size=200'
            "
          />
          <div class="status-dot"></div>
        </div>

        <h1 class="title-gradient">Milijan Davidovic</h1>
        <p class="text-slate-400 mb-6 text-lg">
          Full-Stack Developer & Proxmox Architect
        </p>

        <!-- Badges -->
        <div class="flex flex-wrap justify-center gap-2 mb-8">
          <span
            class="px-3 py-1 bg-cyan-500/10 text-cyan-400 border border-cyan-500/20 rounded-full text-xs"
          >
            Python
          </span>
          <span
            class="px-3 py-1 bg-cyan-500/10 text-cyan-400 border border-cyan-500/20 rounded-full text-xs"
          >
            TypeScript
          </span>
          <span
            class="px-3 py-1 bg-cyan-500/10 text-cyan-400 border border-cyan-500/20 rounded-full text-xs"
          >
            FastAPI
          </span>
          <span
            class="px-3 py-1 bg-cyan-500/10 text-cyan-400 border border-cyan-500/20 rounded-full text-xs"
          >
            Docker
          </span>
        </div>

        <!-- Navigation -->
        <div class="space-y-3">
          <a href="/ims" class="btn-primary">📦 Inventar Logik öffnen</a>
          <a href="/admin" class="btn-secondary">⚙️ Django Administration</a>
        </div>
      </div>
    </div>

    <script>
      const canvas = document.getElementById("bg-canvas");
      const ctx = canvas.getContext("2d");
      let particlesArray;

      function setSize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }

      window.addEventListener("resize", () => {
        setSize();
        init();
      });

      class Particle {
        constructor() {
          this.x = Math.random() * canvas.width;
          this.y = Math.random() * canvas.height;
          this.size = Math.random() * 2 + 1;
          this.speedX = Math.random() * 1 - 0.5;
          this.speedY = Math.random() * 1 - 0.5;
        }
        update() {
          this.x += this.speedX;
          this.y += this.speedY;
          if (this.x > canvas.width) this.x = 0;
          else if (this.x < 0) this.x = canvas.width;
          if (this.y > canvas.height) this.y = 0;
          else if (this.y < 0) this.y = canvas.height;
        }
        draw() {
          ctx.fillStyle = "rgba(103, 232, 249, 0.5)";
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      function init() {
        particlesArray = [];
        const count = (canvas.width * canvas.height) / 10000;
        for (let i = 0; i < count; i++) {
          particlesArray.push(new Particle());
        }
      }

      function connect() {
        for (let a = 0; a < particlesArray.length; a++) {
          for (let b = a; b < particlesArray.length; b++) {
            let distance =
              (particlesArray[a].x - particlesArray[b].x) ** 2 +
              (particlesArray[a].y - particlesArray[b].y) ** 2;
            if (distance < 15000) {
              ctx.strokeStyle = `rgba(103, 232, 249, ${1 - (distance / 15000) * 0.2})`;
              ctx.lineWidth = 1;
              ctx.beginPath();
              ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
              ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
              ctx.stroke();
            }
          }
        }
      }

      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        // Hintergrund-Gradient im Canvas zeichnen
        let grad = ctx.createRadialGradient(
          canvas.width / 2,
          canvas.height / 2,
          0,
          canvas.width / 2,
          canvas.height / 2,
          canvas.width,
        );
        grad.addColorStop(0, "#1e293b");
        grad.addColorStop(1, "#0f172a");
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        for (let p of particlesArray) {
          p.update();
          p.draw();
        }
        connect();
        requestAnimationFrame(animate);
      }

      setSize();
      init();
      animate();
    </script>
  </body>
</html>
